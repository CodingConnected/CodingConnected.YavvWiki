# Site metadata
site_name: YAVV/YAVC Wiki
site_description: Documentatie voor YAVV en YAVC - Verkeersmanagement software
site_author: CodingConnected e.U.
site_url: https://www.codingconnected.eu/yavvwiki/

# Repository (for edit links)
repo_url: https://github.com/codingconnected/yavv-wiki
edit_uri: edit/main/docs/

# Theme configuration
theme:
  name: material
  language: nl
  favicon: assets/favicon.png
  logo: assets/logo.png
  palette:
    # Light mode
    - scheme: default
      primary: orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.dropdown
    - navigation.path
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit      
    - toc.follow
  icon:
    repo: fontawesome/brands/github

# Plugins
plugins:
  - search:
      lang: nl
  - minify:
      minify_html: true

# Extensions
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - admonition
  - abbr
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: Op deze pagina

# Extra CSS/JS
extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

# Extra configuration
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/codingconnected
  version:
    provider: mike

